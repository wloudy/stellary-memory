<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>✦ COSMOS OS: NEBULA MEMORY ✦</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&family=Orbitron:wght@400;600;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --void-deep: #020010;
      --void-blue: #060e2b;
      --starlight: #e8edff;
      --text-dim: #8ba0d4;
      --cyan: #22d3ee;
      --purple: #c084fc;
      --pink: #f472b6;
      --gold: #fbbf24;
      --card-radius: 1.6rem;
      --card-radius-sm: 1.1rem;
      --transition-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
      --transition-smooth: cubic-bezier(0.22, 1, 0.36, 1);
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--void-deep);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      margin: 0;
      position: relative;
      overflow-x: hidden;
      overflow-y: auto;
    }

    /* ============ ГЛУБОКИЙ КОСМИЧЕСКИЙ ФОН С ГАЛАКТИЧЕСКИМ ЯДРОМ ============ */
    .cosmic-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    .galactic-core {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 70vmax;
      height: 70vmax;
      background:
        radial-gradient(ellipse at 50% 50%, rgba(34, 211, 238, 0.06) 0%, transparent 50%),
        radial-gradient(ellipse at 40% 45%, rgba(192, 132, 252, 0.04) 0%, transparent 40%),
        radial-gradient(circle at 55% 50%, rgba(251, 191, 36, 0.03) 0%, transparent 35%);
      animation: galacticPulse 12s ease-in-out infinite;
    }

    @keyframes galacticPulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.7; }
      50% { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
    }

    /* Звёздная пыль */
    .star-dust {
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 8% 15%, rgba(255,255,255,0.9), transparent),
        radial-gradient(1.5px 1.5px at 22% 35%, rgba(200,220,255,0.8), transparent),
        radial-gradient(1px 1px at 38% 12%, #fff, transparent),
        radial-gradient(2px 2px at 55% 70%, rgba(180,200,255,0.7), transparent),
        radial-gradient(1px 1px at 72% 18%, rgba(255,255,255,0.85), transparent),
        radial-gradient(1.5px 1.5px at 85% 55%, rgba(200,220,255,0.75), transparent),
        radial-gradient(1px 1px at 15% 80%, rgba(220,230,255,0.8), transparent),
        radial-gradient(2px 2px at 92% 8%, rgba(255,255,255,0.7), transparent),
        radial-gradient(1px 1px at 48% 60%, #e0e8ff, transparent),
        radial-gradient(1.5px 1.5px at 65% 42%, rgba(200,220,255,0.8), transparent);
      background-size: 300px 300px;
      animation: dustDrift 30s linear infinite;
    }

    @keyframes dustDrift {
      0% { transform: translate(0, 0) rotate(0deg); opacity: 0.6; }
      33% { transform: translate(10px, -8px) rotate(0.5deg); opacity: 0.85; }
      66% { transform: translate(-5px, 12px) rotate(-0.3deg); opacity: 0.7; }
      100% { transform: translate(0, 0) rotate(0deg); opacity: 0.6; }
    }

    /* Созвездия */
    .constellation {
      position: absolute;
      inset: 0;
    }

    .constellation svg {
      width: 100%;
      height: 100%;
      opacity: 0.35;
      animation: constellationFade 8s ease-in-out infinite alternate;
    }

    @keyframes constellationFade {
      0% { opacity: 0.2; }
      100% { opacity: 0.5; }
    }

    /* Падающие звёзды */
    .shooting-stars-container {
      position: absolute;
      inset: 0;
    }

    .shooting-star {
      position: absolute;
      width: 2.5px;
      height: 2.5px;
      background: white;
      border-radius: 50%;
      box-shadow: 0 0 10px 3px rgba(255,255,255,0.7);
      animation: shootAcross 5s linear infinite;
      opacity: 0;
    }

    .shooting-star::before {
      content: '';
      position: absolute;
      top: 50%;
      right: 100%;
      transform: translateY(-50%);
      width: 80px;
      height: 1.5px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.7));
    }

    .shooting-star:nth-child(1) { top: 12%; left: 75%; animation-delay: 0s; }
    .shooting-star:nth-child(2) { top: 28%; left: 55%; animation-delay: 2.8s; }
    .shooting-star:nth-child(3) { top: 8%; left: 68%; animation-delay: 5.5s; }
    .shooting-star:nth-child(4) { top: 38%; left: 82%; animation-delay: 1.7s; }
    .shooting-star:nth-child(5) { top: 18%; left: 48%; animation-delay: 4.1s; }

    @keyframes shootAcross {
      0% { opacity: 0; transform: translate(0, 0) rotate(-30deg) scale(0.5); }
      3% { opacity: 1; transform: translate(-30px, 20px) rotate(-30deg) scale(1); }
      10% { opacity: 0; transform: translate(-400px, 260px) rotate(-30deg) scale(0.3); }
      100% { opacity: 0; transform: translate(-400px, 260px) rotate(-30deg) scale(0.3); }
    }

    /* Парящие частицы космической пыли */
    .floating-dust {
      position: absolute;
      inset: 0;
    }

    .dust-mote {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.5);
      animation: moteDrift 12s linear infinite;
    }

    @keyframes moteDrift {
      0% { transform: translateY(105vh) scale(0); opacity: 0; }
      15% { opacity: 0.8; }
      85% { opacity: 0.6; }
      100% { transform: translateY(-10vh) scale(1.8); opacity: 0; }
    }

    /* ============ ЗАГРУЗОЧНЫЙ ЭКРАН ============ */
    #loading-screen {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, #08082a 0%, #000008 100%);
      z-index: 99999;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transition: opacity 1.2s ease-out, visibility 1.2s;
    }

    .loader-container {
      position: relative;
      width: 320px;
      height: 320px;
    }

    .loader-orbit-system {
      position: absolute;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .loader-sun {
      width: 55px;
      height: 55px;
      background: radial-gradient(circle, #ffdd55, #ff7700);
      border-radius: 50%;
      box-shadow: 0 0 70px #ffaa00, 0 0 140px rgba(255,140,0,0.5), 0 0 220px rgba(255,100,0,0.25);
      z-index: 3;
      animation: loaderSunGlow 2.5s ease-in-out infinite;
    }

    @keyframes loaderSunGlow {
      0%, 100% { box-shadow: 0 0 70px #ffaa00, 0 0 140px rgba(255,140,0,0.5); }
      50% { box-shadow: 0 0 100px #ffcc44, 0 0 200px rgba(255,150,0,0.7); }
    }

    .loader-orbit {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.06);
      animation: orbitSpin linear infinite;
    }

    .loader-planet-dot {
      position: absolute;
      border-radius: 50%;
      box-shadow: 0 0 20px currentColor;
    }

    .orbit-1 { width: 120px; height: 120px; animation-duration: 3.5s; }
    .orbit-1 .loader-planet-dot { width: 9px; height: 9px; top: 8px; left: 50%; background: #38bdf8; color: #38bdf8; }

    .orbit-2 { width: 200px; height: 200px; animation-duration: 6s; animation-direction: reverse; }
    .orbit-2 .loader-planet-dot { width: 12px; height: 12px; top: 18px; left: 15%; background: #c084fc; color: #c084fc; }

    .orbit-3 { width: 290px; height: 290px; animation-duration: 9s; }
    .orbit-3 .loader-planet-dot { width: 15px; height: 15px; bottom: 25px; right: 18%; background: #f472b6; color: #f472b6; }

    @keyframes orbitSpin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    #loading-screen.orbit-lock .loader-orbit {
      animation: none !important;
      transition: transform 1.8s cubic-bezier(0.4, 0, 0.2, 1);
      transform: rotate(0deg) !important;
    }

    .loading-text-block {
      margin-top: 30px;
      text-align: center;
    }

    .loading-status-line {
      font-family: 'Orbitron', monospace;
      font-weight: 400;
      letter-spacing: 6px;
      color: #8ba0d4;
      font-size: 0.65rem;
      margin-bottom: 14px;
      text-transform: uppercase;
    }

    .loading-authors-line {
      font-family: 'Space Mono', monospace;
      font-size: 0.85rem;
      color: #ffffff;
      letter-spacing: 1px;
    }

    .typing-cursor {
      display: inline-block;
      width: 7px;
      height: 14px;
      background: #22d3ee;
      margin-left: 4px;
      vertical-align: middle;
      animation: cursorBlink 0.9s step-end infinite;
      box-shadow: 0 0 10px #22d3ee;
    }

    @keyframes cursorBlink { 50% { opacity: 0; } }

    /* ============ ОСНОВНОЙ КОНТЕЙНЕР ============ */
    .app-shell {
      display: flex;
      width: 100%;
      max-width: 1600px;
      gap: 1.6rem;
      position: relative;
      z-index: 20;
      align-items: flex-start;
    }

    /* ============ САЙДБАР ============ */
    .sidebar-panel {
      width: 285px;
      flex-shrink: 0;
      background: rgba(4, 8, 24, 0.55);
      backdrop-filter: blur(60px) saturate(180%);
      -webkit-backdrop-filter: blur(60px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 2.5rem;
      padding: 2rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.8rem;
      box-shadow:
        0 50px 80px -30px rgba(0,0,0,0.9),
        inset 0 0 60px rgba(34, 211, 238, 0.04),
        inset 0 1px 0 rgba(255,255,255,0.04);
      color: white;
      position: relative;
      overflow: hidden;
    }

    .sidebar-panel::before {
      content: '';
      position: absolute;
      top: -60%;
      left: -40%;
      width: 180%;
      height: 180%;
      background: radial-gradient(ellipse at 35% 25%, rgba(192,132,252,0.07), transparent 65%);
      pointer-events: none;
    }

    .brand-logo {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.8rem;
      font-weight: 900;
      letter-spacing: -1px;
      background: linear-gradient(180deg, #e0f2fe 0%, #7dd3fc 60%, #38bdf8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 22px rgba(56,189,248,0.5));
      position: relative;
      z-index: 1;
    }

    .stats-row {
      display: flex;
      gap: 0.7rem;
      position: relative;
      z-index: 1;
    }

    .stat-card {
      background: rgba(255,255,255,0.025);
      border-radius: 1.3rem;
      padding: 0.95rem 0.5rem;
      flex: 1;
      text-align: center;
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255,255,255,0.04);
      transition: all 0.4s var(--transition-smooth);
    }

    .stat-card:hover {
      background: rgba(255,255,255,0.05);
      border-color: rgba(56,189,248,0.25);
      box-shadow: 0 0 30px rgba(34,211,238,0.12);
      transform: translateY(-2px);
    }

    .stat-value {
      font-family: 'Orbitron', monospace;
      font-size: 1.6rem;
      font-weight: 700;
      color: #f0f4ff;
      letter-spacing: 1px;
    }

    .stat-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #6b7fa8;
      margin-top: 2px;
    }

    /* Индикатор эффективности */
    .efficiency-bar {
      position: relative;
      z-index: 1;
      background: rgba(255,255,255,0.03);
      border-radius: 1rem;
      padding: 0.8rem 1rem;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .efficiency-label {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #6b7fa8;
      margin-bottom: 0.5rem;
      display: flex;
      justify-content: space-between;
    }

    .efficiency-track {
      height: 4px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
      overflow: hidden;
    }

    .efficiency-fill {
      height: 100%;
      background: linear-gradient(90deg, #22d3ee, #c084fc);
      border-radius: 2px;
      transition: width 0.8s var(--transition-smooth);
      box-shadow: 0 0 12px rgba(34,211,238,0.5);
    }

    .action-buttons {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      position: relative;
      z-index: 1;
    }

    .cosmic-btn {
      padding: 0.9rem 1.2rem;
      border-radius: 1.3rem;
      font-weight: 600;
      font-size: 0.82rem;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.08);
      color: #dde4f5;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      transition: all 0.35s var(--transition-smooth);
      backdrop-filter: blur(15px);
      position: relative;
      overflow: hidden;
      letter-spacing: 0.5px;
    }

    .cosmic-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.06) 50%, transparent 60%);
      transform: translateX(-100%);
      transition: transform 0.6s;
    }

    .cosmic-btn:hover::before {
      transform: translateX(100%);
    }

    .cosmic-btn:hover {
      background: rgba(34,211,238,0.08);
      border-color: rgba(34,211,238,0.4);
      box-shadow: 0 0 35px rgba(34,211,238,0.25);
      transform: translateY(-2px);
      color: #ffffff;
    }

    .cosmic-btn:active {
      transform: scale(0.96);
    }

    .btn-hint-glow {
      background: linear-gradient(135deg, rgba(30, 58, 138, 0.6), rgba(15, 23, 42, 0.8));
      border-color: rgba(34,211,238,0.35);
    }

    .inventory-section {
      position: relative;
      z-index: 1;
    }

    .inventory-title {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: #6b7fa8;
      margin-bottom: 0.7rem;
    }

    .inventory-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.55rem;
    }

    .inv-badge {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.12);
      cursor: pointer;
      transition: all 0.35s var(--transition-bounce);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 0.75rem;
      background-size: cover;
      background-position: center;
      position: relative;
    }

    .inv-badge::after {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      background: transparent;
      transition: all 0.35s;
    }

    .inv-badge:hover {
      transform: scale(1.3);
      border-color: #c084fc;
      box-shadow: 0 0 35px rgba(192,132,252,0.6);
      z-index: 10;
    }

    .inv-badge.pop-anim {
      animation: popBounce 0.55s var(--transition-bounce);
    }

    @keyframes popBounce {
      0% { transform: scale(0); }
      50% { transform: scale(1.35); }
      70% { transform: scale(0.9); }
      100% { transform: scale(1); }
    }

    /* ============ ИГРОВАЯ СЕТКА ============ */
    .game-grid {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 1.1rem;
      perspective: 2200px;
    }

    .card-wrapper {
      aspect-ratio: 3 / 4.3;
      cursor: pointer;
      transition: transform 0.35s var(--transition-bounce);
      position: relative;
      animation: cardFloat 8s ease-in-out infinite;
    }

    .card-wrapper:nth-child(odd) { animation-delay: -4s; }
    .card-wrapper:nth-child(3n) { animation-delay: -2s; }
    .card-wrapper:nth-child(5n+2) { animation-delay: -6s; }

    @keyframes cardFloat {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
    }

    .card-wrapper:hover {
      transform: translateY(-12px) scale(1.03);
      z-index: 10;
      animation: none;
    }

    .card-glow {
      position: absolute;
      inset: -3px;
      border-radius: var(--card-radius);
      background: transparent;
      transition: all 0.5s;
      z-index: -1;
      opacity: 0;
    }

    .card-wrapper:hover .card-glow {
      background: linear-gradient(135deg, rgba(34,211,238,0.35), rgba(192,132,252,0.35), rgba(244,114,182,0.3));
      filter: blur(18px);
      inset: -8px;
      opacity: 1;
      border-radius: calc(var(--card-radius) + 4px);
    }

    .card-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.7s cubic-bezier(0.22, 1, 0.36, 1);
      border-radius: var(--card-radius);
    }

    .card-inner.flipped {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      border-radius: var(--card-radius);
      overflow: hidden;
      box-shadow: 0 30px 50px -18px rgba(0,0,0,0.95);
    }

    .card-back {
      background: radial-gradient(circle at 35% 35%, #1a2548, #020617);
      border: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      justify-content: center;
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none"><circle cx="60" cy="60" r="35" stroke="white" stroke-opacity="0.12" stroke-width="1"/><circle cx="60" cy="60" r="25" stroke="white" stroke-opacity="0.08" stroke-width="0.5" stroke-dasharray="4 4"/><path d="M60 18 L64 38 L84 42 L64 46 L60 66 L56 46 L36 42 L56 38 Z" fill="white" fill-opacity="0.18"/><circle cx="60" cy="60" r="8" fill="white" fill-opacity="0.12"/></svg>');
      background-size: 65%;
      background-repeat: no-repeat;
      background-position: center;
    }

    .card-front {
      transform: rotateY(180deg);
      background: #010510;
      border: 1px solid rgba(255,255,255,0.12);
      background-size: cover;
      background-position: center;
    }

    /* Эффект при совпадении */
    .card-inner.matched .card-front {
      border-color: rgba(34,211,238,0.5);
      box-shadow: inset 0 0 50px rgba(34,211,238,0.2);
      animation: matchGlow 1.5s ease-out;
    }

    @keyframes matchGlow {
      0% { box-shadow: inset 0 0 80px rgba(34,211,238,0.5), 0 0 40px rgba(34,211,238,0.4); }
      100% { box-shadow: inset 0 0 20px rgba(34,211,238,0.1), 0 0 0 rgba(34,211,238,0); }
    }

    /* Планетарные градиенты */
    .planet-sun { background-image: radial-gradient(circle at 38% 38%, #fef08a 0%, #f59e0b 40%, #b45309 100%); }
    .planet-mercury { background-image: radial-gradient(circle at 38% 38%, #d1d5db 0%, #6b7280 50%, #374151 100%); }
    .planet-venus { background-image: radial-gradient(circle at 42% 42%, #fcd34d 0%, #d97706 45%, #78350f 100%); }
    .planet-earth { background-image: radial-gradient(circle at 38% 38%, #60a5fa 0%, #2563eb 45%, #064e3b 100%); }
    .planet-mars { background-image: radial-gradient(circle at 38% 38%, #f87171 0%, #dc2626 45%, #7f1d1d 100%); }
    .planet-jupiter { background-image: radial-gradient(circle at 38% 38%, #ddd6fe 0%, #8b5cf6 45%, #4c1d95 100%); }
    .planet-saturn { background-image: radial-gradient(circle at 38% 38%, #fef3c7 0%, #d97706 40%, #9d174d 100%); }
    .planet-uranus { background-image: radial-gradient(circle at 38% 38%, #a5f3fc 0%, #0891b2 45%, #164e63 100%); }
    .planet-neptune { background-image: radial-gradient(circle at 38% 38%, #93c5fd 0%, #1d4ed8 45%, #1e3a8a 100%); }
    .planet-moon { background-image: radial-gradient(circle at 38% 38%, #f3f4f6 0%, #9ca3af 50%, #4b5563 100%); }
    .planet-galaxy { background-image: radial-gradient(circle at 38% 38%, #c4b5fd 0%, #7c3aed 45%, #2e1065 100%); }
    .planet-nebula { background-image: radial-gradient(circle at 38% 38%, #f9a8d4 0%, #db2777 45%, #831843 100%); }

    /* ============ МОДАЛЬНЫЕ ОКНА ============ */
    .info-modal {
      position: fixed;
      inset: 0;
      background: rgba(1,2,14,0.88);
      backdrop-filter: blur(45px);
      -webkit-backdrop-filter: blur(45px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s;
    }

    .info-modal.active {
      opacity: 1;
      pointer-events: auto;
    }

    .info-card {
      background: rgba(8, 16, 38, 0.9);
      backdrop-filter: blur(55px);
      -webkit-backdrop-filter: blur(55px);
      border-radius: 2.2rem;
      padding: 2.2rem;
      max-width: 520px;
      width: 92%;
      border: 1px solid rgba(255,255,255,0.12);
      color: white;
      box-shadow: 0 40px 80px rgba(0,0,0,0.8);
      transform: scale(0.88);
      transition: transform 0.4s var(--transition-bounce);
    }

    .info-modal.active .info-card {
      transform: scale(1);
    }

    .win-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,1,10,0.94);
      backdrop-filter: blur(55px);
      -webkit-backdrop-filter: blur(55px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.5s;
    }

    .win-overlay.visible {
      opacity: 1;
      visibility: visible;
    }

    .win-content {
      text-align: center;
      color: white;
      transform: translateY(40px);
      transition: transform 0.6s var(--transition-bounce);
      max-width: 500px;
      width: 90%;
    }

    .win-overlay.visible .win-content {
      transform: translateY(0);
    }

    .rating-container {
      margin: 1.5rem 0;
    }

    .stars-display {
      font-size: 3.5rem;
      letter-spacing: 0.5rem;
      margin-bottom: 0.8rem;
      animation: starReveal 1s ease-out;
    }

    @keyframes starReveal {
      0% { transform: scale(0) rotate(-180deg); opacity: 0; }
      60% { transform: scale(1.3) rotate(10deg); opacity: 1; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    .rank-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.3rem;
      letter-spacing: 3px;
      margin-bottom: 1.5rem;
      text-transform: uppercase;
    }

    .score-details {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin: 1.5rem 0;
      text-align: left;
    }

    .score-item {
      background: rgba(255,255,255,0.03);
      border-radius: 1rem;
      padding: 1rem;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .score-item-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #6b7fa8;
      margin-bottom: 0.3rem;
    }

    .score-item-value {
      font-family: 'Orbitron', monospace;
      font-size: 1.2rem;
      color: #f0f4ff;
    }

    /* ============ АДАПТИВНОСТЬ ============ */
    @media (max-width: 1300px) {
      .game-grid { grid-template-columns: repeat(6, 1fr); gap: 0.9rem; }
      .sidebar-panel { width: 260px; }
    }

    @media (max-width: 1100px) {
      .game-grid { grid-template-columns: repeat(4, 1fr); gap: 0.8rem; }
      .sidebar-panel { width: 240px; padding: 1.5rem 1.2rem; }
      .brand-logo { font-size: 1.5rem; }
    }

    @media (max-width: 768px) {
      body { padding: 0.4rem; align-items: flex-start; }
      .app-shell { flex-direction: column; gap: 0.9rem; }
      .sidebar-panel {
        width: 100%;
        flex-direction: row;
        flex-wrap: wrap;
        gap: 0.7rem;
        padding: 1rem 1.2rem;
        border-radius: 1.8rem;
        position: sticky;
        top: 0.4rem;
        z-index: 50;
      }
      .brand-logo { font-size: 1.3rem; order: 1; }
      .stats-row { order: 2; gap: 0.5rem; }
      .stat-card { padding: 0.6rem 0.5rem; border-radius: 1rem; }
      .stat-value { font-size: 1.2rem; }
      .action-buttons { flex-direction: row; order: 3; width: 100%; gap: 0.5rem; }
      .cosmic-btn { flex: 1; padding: 0.7rem; font-size: 0.75rem; border-radius: 1rem; }
      .efficiency-bar { order: 4; width: 100%; }
      .inventory-section { order: 5; width: 100%; }
      .inv-badge { width: 38px; height: 38px; }
      .game-grid { grid-template-columns: repeat(4, 1fr); gap: 0.6rem; }
      :root { --card-radius: 1.2rem; }
      .card-wrapper:hover { transform: translateY(-4px); }
    }

    @media (max-width: 480px) {
      .game-grid { grid-template-columns: repeat(3, 1fr); gap: 0.45rem; }
      .sidebar-panel { padding: 0.7rem 0.9rem; border-radius: 1.4rem; }
      .brand-logo { font-size: 1.1rem; }
      .inv-badge { width: 32px; height: 32px; }
      .info-card { padding: 1.5rem; border-radius: 1.6rem; }
      .score-details { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- ============ ФОНОВЫЕ ЭФФЕКТЫ ============ -->
  <div class="cosmic-bg">
    <div class="galactic-core"></div>
    <div class="star-dust"></div>
    <div class="constellation">
      <svg viewBox="0 0 1000 800" preserveAspectRatio="none">
        <line x1="120" y1="150" x2="280" y2="220" stroke="white" stroke-width="0.4" stroke-opacity="0.5"/>
        <line x1="280" y1="220" x2="350" y2="380" stroke="white" stroke-width="0.3" stroke-opacity="0.4"/>
        <line x1="350" y1="380" x2="220" y2="450" stroke="white" stroke-width="0.35" stroke-opacity="0.45"/>
        <line x1="220" y1="450" x2="120" y2="150" stroke="white" stroke-width="0.3" stroke-opacity="0.4"/>
        <line x1="650" y1="100" x2="780" y2="200" stroke="white" stroke-width="0.35" stroke-opacity="0.5"/>
        <line x1="780" y1="200" x2="850" y2="350" stroke="white" stroke-width="0.3" stroke-opacity="0.4"/>
        <line x1="850" y1="350" x2="720" y2="420" stroke="white" stroke-width="0.35" stroke-opacity="0.45"/>
        <line x1="720" y1="420" x2="650" y2="100" stroke="white" stroke-width="0.3" stroke-opacity="0.4"/>
        <circle cx="120" cy="150" r="1.5" fill="white" opacity="0.7"/>
        <circle cx="280" cy="220" r="1.2" fill="white" opacity="0.6"/>
        <circle cx="350" cy="380" r="1.8" fill="white" opacity="0.7"/>
        <circle cx="220" cy="450" r="1.3" fill="white" opacity="0.5"/>
        <circle cx="650" cy="100" r="1.4" fill="white" opacity="0.6"/>
        <circle cx="780" cy="200" r="1.6" fill="white" opacity="0.7"/>
        <circle cx="850" cy="350" r="1.2" fill="white" opacity="0.5"/>
        <circle cx="720" cy="420" r="1.5" fill="white" opacity="0.6"/>
      </svg>
    </div>
    <div class="shooting-stars-container">
      <div class="shooting-star"></div><div class="shooting-star"></div><div class="shooting-star"></div>
      <div class="shooting-star"></div><div class="shooting-star"></div>
    </div>
    <div class="floating-dust" id="floating-dust"></div>
  </div>

  <!-- ============ ЗАГРУЗОЧНЫЙ ЭКРАН ============ -->
  <div id="loading-screen">
    <div class="loader-container">
      <div class="loader-orbit-system">
        <div class="loader-sun"></div>
        <div class="loader-orbit orbit-1"><div class="loader-planet-dot"></div></div>
        <div class="loader-orbit orbit-2"><div class="loader-planet-dot"></div></div>
        <div class="loader-orbit orbit-3"><div class="loader-planet-dot"></div></div>
      </div>
    </div>
    <div class="loading-text-block">
      <div class="loading-status-line" id="loading-status">Система загружается...</div>
      <div class="loading-authors-line">
        <span id="authors-loader-text"></span><span class="typing-cursor"></span>
      </div>
    </div>
  </div>

  <!-- ============ ОСНОВНОЙ ИНТЕРФЕЙС ============ -->
  <div class="app-shell">
    <aside class="sidebar-panel">
      <div class="brand-logo">✦ NEBULA</div>
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-value" id="moves">0</div>
          <div class="stat-label">Ходов</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="timer">00:00</div>
          <div class="stat-label">Время</div>
        </div>
      </div>

      <!-- Индикатор эффективности -->
      <div class="efficiency-bar">
        <div class="efficiency-label">
          <span>Эффективность</span>
          <span id="efficiency-percent" style="color:#22d3ee;">100%</span>
        </div>
        <div class="efficiency-track">
          <div class="efficiency-fill" id="efficiency-fill" style="width: 100%;"></div>
        </div>
      </div>

      <div class="action-buttons">
        <button class="cosmic-btn btn-hint-glow" id="hint-btn">
          <i class="fas fa-sun"></i> Подсказка <span id="hints-count">(2)</span>
        </button>
        <button class="cosmic-btn" onclick="restartGame()">
          <i class="fas fa-rocket"></i> Перезапуск
        </button>
      </div>
      <div class="inventory-section">
        <div class="inventory-title">Собранные миры</div>
        <div class="inventory-grid" id="inventory"></div>
      </div>
    </aside>

    <main class="game-grid" id="grid"></main>
  </div>

  <!-- ============ ИНФО-ОКНО ============ -->
  <div class="info-modal" id="info-modal">
    <div class="info-card">
      <button onclick="closeInfo()" style="float:right;background:none;border:none;color:white;font-size:2rem;cursor:pointer;line-height:1;opacity:0.7;">&times;</button>
      <h3 id="info-title" style="font-family:'Orbitron'; margin-bottom:1.2rem; font-size:1.4rem;"></h3>
      <p id="info-desc" style="color:#bcc8e0; line-height:1.75; font-weight:400;"></p>
    </div>
  </div>

  <!-- ============ ЭКРАН ПОБЕДЫ ============ -->
  <div class="win-overlay" id="win-screen">
    <div class="win-content">
      <h2 style="font-family:'Orbitron'; font-size:2rem; margin-bottom:0.5rem; letter-spacing:2px;">ГАЛАКТИКА ОТКРЫТА</h2>
      <p style="color:#8ba0d4; margin-bottom:1.5rem;">Миссия завершена успешно</p>

      <div class="rating-container">
        <div class="stars-display" id="win-stars">★★★</div>
        <div class="rank-title" id="rank-title"></div>
      </div>

      <div class="score-details">
        <div class="score-item">
          <div class="score-item-label">Ходов</div>
          <div class="score-item-value" id="final-moves">0</div>
        </div>
        <div class="score-item">
          <div class="score-item-label">Время</div>
          <div class="score-item-value" id="final-time">00:00</div>
        </div>
        <div class="score-item">
          <div class="score-item-label">Точность</div>
          <div class="score-item-value" id="final-accuracy">100%</div>
        </div>
        <div class="score-item">
          <div class="score-item-label">Рейтинг</div>
          <div class="score-item-value" id="final-score">0</div>
        </div>
      </div>

      <button class="cosmic-btn" onclick="restartGame()" style="margin:0 auto; min-width:220px;">
        <i class="fas fa-globe"></i> Новое исследование
      </button>
    </div>
  </div>

  <script>
    (function() {
      // ⚠️ МЕСТА ДЛЯ URL КАРТИНОК ПЛАНЕТ (замените пустые строки на ссылки)
      const spaceData = [
        { id: 'sun', name: 'Солнце', type: 'Звезда', desc: 'Центр нашей системы. Температура ядра — 15 миллионов градусов. Каждую секунду превращает 600 млн тонн водорода в гелий.', imgUrl: '', planetClass: 'planet-sun' },
        { id: 'mercury', name: 'Меркурий', type: 'Планета', desc: 'Ближайшая к Солнцу планета. Перепады температур: от +430°C днём до -180°C ночью.', imgUrl: '', planetClass: 'planet-mercury' },
        { id: 'venus', name: 'Венера', type: 'Планета', desc: 'Самая горячая планета. Атмосфера из углекислого газа создаёт сильнейший парниковый эффект.', imgUrl: '', planetClass: 'planet-venus' },
        { id: 'earth', name: 'Земля', type: 'Планета', desc: 'Наш дом. 71% поверхности покрыто водой. Единственная известная планета, на которой есть жизнь.', imgUrl: '', planetClass: 'planet-earth' },
        { id: 'mars', name: 'Марс', type: 'Планета', desc: 'Красная планета. Здесь находится Олимп — высочайший вулкан в Солнечной системе (выше Эвереста в 2.5 раза).', imgUrl: '', planetClass: 'planet-mars' },
        { id: 'jupiter', name: 'Юпитер', type: 'Газовый гигант', desc: 'Крупнейшая планета. Большое Красное Пятно — гигантский шторм, который бушует уже более 350 лет.', imgUrl: '', planetClass: 'planet-jupiter' },
        { id: 'saturn', name: 'Сатурн', type: 'Газовый гигант', desc: 'Великолепная система колец из миллиардов частичек льда и пыли. Плотность меньше плотности воды.', imgUrl: '', planetClass: 'planet-saturn' },
        { id: 'uranus', name: 'Уран', type: 'Ледяной гигант', desc: 'Вращается «лёжа на боку» — ось наклонена почти на 98 градусов из-за древнего столкновения.', imgUrl: '', planetClass: 'planet-uranus' },
        { id: 'neptune', name: 'Нептун', type: 'Ледяной гигант', desc: 'Самая ветреная планета. Скорость ветра здесь достигает 2100 км/ч.', imgUrl: '', planetClass: 'planet-neptune' },
        { id: 'moon', name: 'Луна', type: 'Спутник', desc: 'Единственный спутник Земли. Всегда повёрнута к нам одной стороной из-за приливного захвата.', imgUrl: '', planetClass: 'planet-moon' },
        { id: 'galaxy', name: 'Млечный Путь', type: 'Галактика', desc: 'Наша галактика. Содержит от 100 до 400 миллиардов звёзд. В центре — сверхмассивная чёрная дыра.', imgUrl: '', planetClass: 'planet-galaxy' },
        { id: 'nebula', name: 'Туманность Ориона', type: 'Туманность', desc: 'Активные «звёздные ясли». Прямо сейчас здесь из газа и пыли рождаются сотни новых звёзд.', imgUrl: '', planetClass: 'planet-nebula' }
      ];

      // --- СИСТЕМА ОЦЕНКИ ---
      const TOTAL_PAIRS = spaceData.length; // 12 пар
      const PERFECT_MOVES = TOTAL_PAIRS; // 12 ходов — идеал (каждый ход открывает пару)
      const MAX_SCORE = 10000;

      function calculateScore(moves, timeSeconds) {
        // Идеальные показатели
        const idealMoves = PERFECT_MOVES;
        const idealTime = 30; // 30 секунд — эталонное время

        // Штраф за лишние ходы (каждый ход сверх идеала снижает оценку)
        const extraMoves = Math.max(0, moves - idealMoves);
        const movePenalty = extraMoves * 120; // -120 очков за каждый лишний ход

        // Штраф за время (каждая секунда сверх эталона снижает оценку)
        const extraTime = Math.max(0, timeSeconds - idealTime);
        const timePenalty = extraTime * 8; // -8 очков за каждую лишнюю секунду

        // Базовая оценка
        let score = MAX_SCORE - movePenalty - timePenalty;

        // Бонус за скорость (если быстрее эталона)
        if (timeSeconds < idealTime) {
          const timeBonus = (idealTime - timeSeconds) * 15;
          score += timeBonus;
        }

        // Бонус за точность (если ходов меньше или равно идеалу)
        if (moves <= idealMoves) {
          const accuracyBonus = (idealMoves - moves + 1) * 200;
          score += accuracyBonus;
        }

        // Ограничение
        score = Math.max(100, Math.min(MAX_SCORE + 2000, Math.round(score)));

        return score;
      }

      function calculateAccuracy(moves) {
        if (moves === 0) return 100;
        const accuracy = Math.round((TOTAL_PAIRS / moves) * 100);
        return Math.min(100, accuracy);
      }

      function getStars(score) {
        if (score >= 9000) return '★★★★★';
        if (score >= 7000) return '★★★★☆';
        if (score >= 5000) return '★★★☆☆';
        if (score >= 3000) return '★★☆☆☆';
        return '★☆☆☆☆';
      }

      function getRank(score) {
        if (score >= 9500) return 'Гранд-мастер Галактики';
        if (score >= 8000) return 'Капитан Звёздного Флота';
        if (score >= 6500) return 'Офицер-исследователь';
        if (score >= 5000) return 'Космический навигатор';
        if (score >= 3500) return 'Пилот-стажёр';
        if (score >= 2000) return 'Кадет Академии';
        return 'Космический турист';
      }

      function getRankColor(score) {
        if (score >= 8000) return 'linear-gradient(135deg, #fbbf24, #f59e0b)';
        if (score >= 6000) return 'linear-gradient(135deg, #c084fc, #a855f7)';
        if (score >= 4000) return 'linear-gradient(135deg, #22d3ee, #06b6d4)';
        if (score >= 2000) return 'linear-gradient(135deg, #94a3b8, #64748b)';
        return 'linear-gradient(135deg, #ef4444, #dc2626)';
      }

      function updateEfficiency() {
        if (state.moves === 0) {
          document.getElementById('efficiency-percent').textContent = '100%';
          document.getElementById('efficiency-fill').style.width = '100%';
          return;
        }
        const accuracy = calculateAccuracy(state.moves);
        document.getElementById('efficiency-percent').textContent = accuracy + '%';
        document.getElementById('efficiency-fill').style.width = accuracy + '%';

        // Цвет индикатора в зависимости от эффективности
        const fill = document.getElementById('efficiency-fill');
        if (accuracy >= 80) {
          fill.style.background = 'linear-gradient(90deg, #22d3ee, #c084fc)';
        } else if (accuracy >= 50) {
          fill.style.background = 'linear-gradient(90deg, #fbbf24, #f59e0b)';
        } else {
          fill.style.background = 'linear-gradient(90deg, #f87171, #ef4444)';
        }
      }

      // --- СОСТОЯНИЕ ИГРЫ ---
      let state = { cards: [], flipped: [], matched: 0, moves: 0, timer: 0, interval: null, hintsLeft: 2, locked: false, gameStarted: false };

      // Парящая пыль
      function spawnDust() {
        const container = document.getElementById('floating-dust');
        if (!container) return;
        container.innerHTML = '';
        for (let i = 0; i < 35; i++) {
          const mote = document.createElement('div');
          mote.className = 'dust-mote';
          const size = Math.random() * 3.5 + 1.2;
          mote.style.width = size + 'px';
          mote.style.height = size + 'px';
          mote.style.left = Math.random() * 100 + '%';
          mote.style.animationDuration = (Math.random() * 10 + 8) + 's';
          mote.style.animationDelay = Math.random() * 10 + 's';
          mote.style.opacity = Math.random() * 0.5 + 0.25;
          container.appendChild(mote);
        }
      }

      function fmtTime(s) {
        const m = Math.floor(s / 60), sec = s % 60;
        return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
      }

      function startClock() {
        if (state.interval) clearInterval(state.interval);
        state.interval = setInterval(() => {
          state.timer++;
          document.getElementById('timer').textContent = fmtTime(state.timer);
        }, 1000);
      }

      function flipCard(el) {
        if (state.locked || el.classList.contains('flipped') || el.classList.contains('matched')) return;
        if (!state.gameStarted) { state.gameStarted = true; startClock(); }
        el.classList.add('flipped');
        state.flipped.push(el);
        if (state.flipped.length === 2) {
          state.moves++;
          document.getElementById('moves').textContent = state.moves;
          updateEfficiency();
          state.locked = true;
          checkMatch();
        }
      }

      function checkMatch() {
        const [a, b] = state.flipped;
        if (a.dataset.id === b.dataset.id) {
          a.classList.add('matched'); b.classList.add('matched');
          state.matched++;
          addInventory(a.dataset.id);
          state.flipped = []; state.locked = false;
          if (state.matched === spaceData.length) victory();
        } else {
          setTimeout(() => {
            a.classList.remove('flipped'); b.classList.remove('flipped');
            state.flipped = []; state.locked = false;
          }, 850);
        }
      }

      function addInventory(id) {
        if (document.querySelector(`.inv-badge[data-id="${id}"]`)) return;
        const data = spaceData.find(d => d.id === id);
        const badge = document.createElement('div');
        badge.className = 'inv-badge pop-anim';
        badge.dataset.id = id;
        if (data.imgUrl && data.imgUrl.trim() !== '') badge.style.backgroundImage = `url(${data.imgUrl})`;
        else badge.classList.add(data.planetClass);
        badge.onclick = () => showInfo(id);
        document.getElementById('inventory').appendChild(badge);
        setTimeout(() => badge.classList.remove('pop-anim'), 600);
      }

      function showInfo(id) {
        const d = spaceData.find(x => x.id === id);
        document.getElementById('info-title').textContent = d.name;
        document.getElementById('info-desc').textContent = d.desc;
        document.getElementById('info-modal').classList.add('active');
      }

      window.closeInfo = () => document.getElementById('info-modal').classList.remove('active');

      function victory() {
        clearInterval(state.interval);

        const score = calculateScore(state.moves, state.timer);
        const accuracy = calculateAccuracy(state.moves);
        const stars = getStars(score);
        const rank = getRank(score);
        const rankColor = getRankColor(score);

        document.getElementById('final-moves').textContent = state.moves;
        document.getElementById('final-time').textContent = fmtTime(state.timer);
        document.getElementById('final-accuracy').textContent = accuracy + '%';
        document.getElementById('final-score').textContent = score;
        document.getElementById('win-stars').textContent = stars;

        const rankEl = document.getElementById('rank-title');
        rankEl.textContent = rank;
        rankEl.style.background = rankColor;
        rankEl.style.webkitBackgroundClip = 'text';
        rankEl.style.webkitTextFillColor = 'transparent';
        rankEl.style.backgroundClip = 'text';

        document.getElementById('win-screen').classList.add('visible');
      }

      function restartGame() {
        clearInterval(state.interval);
        state = { cards: [], flipped: [], matched: 0, moves: 0, timer: 0, interval: null, hintsLeft: 2, locked: false, gameStarted: false };
        document.getElementById('moves').textContent = '0';
        document.getElementById('timer').textContent = '00:00';
        document.getElementById('hints-count').textContent = '(2)';
        document.getElementById('win-screen').classList.remove('visible');
        document.getElementById('inventory').innerHTML = '';
        updateEfficiency();
        buildBoard();
      }

      function buildBoard() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        const deck = [...spaceData, ...spaceData].sort(() => Math.random() - 0.5);
        deck.forEach(item => {
          const wrap = document.createElement('div');
          wrap.className = 'card-wrapper';
          const glow = document.createElement('div');
          glow.className = 'card-glow';
          const inner = document.createElement('div');
          inner.className = 'card-inner';
          inner.dataset.id = item.id;
          let frontBg = '';
          if (item.imgUrl && item.imgUrl.trim() !== '') frontBg = `background-image:url('${item.imgUrl}');background-size:cover;`;
          inner.innerHTML = `
            <div class="card-face card-front ${(!item.imgUrl||item.imgUrl.trim()==='')?item.planetClass:''}" style="${frontBg}"></div>
            <div class="card-face card-back"></div>
          `;
          wrap.appendChild(glow);
          wrap.appendChild(inner);
          wrap.addEventListener('click', () => flipCard(inner));
          grid.appendChild(wrap);
          state.cards.push(inner);
        });
      }

      document.getElementById('hint-btn').addEventListener('click', () => {
        if (state.locked || state.hintsLeft <= 0) return;
        if (!state.gameStarted) { state.gameStarted = true; startClock(); }
        state.hintsLeft--;
        document.getElementById('hints-count').textContent = `(${state.hintsLeft})`;
        state.locked = true;
        const hidden = state.cards.filter(c => !c.classList.contains('matched') && !c.classList.contains('flipped'));
        hidden.forEach(c => c.classList.add('flipped'));
        setTimeout(() => {
          hidden.forEach(c => c.classList.remove('flipped'));
          state.locked = false;
        }, 1500);
      });

      window.restartGame = restartGame;
      spawnDust();
      buildBoard();

      window.addEventListener('load', () => {
        const txt = "Авторы: Голосов Даниил Алексеевич | Баринова София Владимировна";
        const el = document.getElementById('authors-loader-text');
        let i = 0;
        function type() {
          if (i < txt.length) { el.textContent += txt.charAt(i); i++; setTimeout(type, 40); }
          else {
            document.getElementById('loading-status').textContent = "Доступ разрешён. Добро пожаловать.";
            setTimeout(() => {
              document.getElementById('loading-screen').classList.add('orbit-lock');
              setTimeout(() => {
                document.getElementById('loading-screen').style.opacity = '0';
                setTimeout(() => { document.getElementById('loading-screen').style.display = 'none'; }, 1200);
              }, 1800);
            }, 900);
          }
        }
        setTimeout(type, 700);
      });

      document.getElementById('info-modal').addEventListener('click', function(e) { if (e.target === this) closeInfo(); });
    })();
  </script>
</body>
</html>
